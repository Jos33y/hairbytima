  <!-- App Loader Styles - Mobile Optimized -->
  <style>
    :root {
      --loader-bg: #111111;
      --loader-pink: #EC4899;
      --loader-pink-hover: #DB2777;
      --loader-pink-glow: rgba(236, 72, 153, 0.4);
      --loader-gold: #D4AF37;
      --loader-text: rgba(255, 255, 255, 0.5);
      --loader-text-bright: rgba(255, 255, 255, 0.9);
    }

    #app-loader * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body.loader-active {
      overflow: hidden;
    }

    #app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--loader-bg);
      z-index: 9999;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden; /* CRITICAL: Prevent orb overflow */
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                  visibility 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #app-loader.hidden {
      opacity: 0;
      visibility: hidden;
      transform: scale(1.02);
    }

    .loader-bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      animation: float-orb 8s ease-in-out infinite;
      pointer-events: none;
    }

    .loader-bg-orb-1 {
      width: 300px;
      height: 300px;
      background: var(--loader-pink);
      top: -80px;
      right: -80px;
      animation-delay: 0s;
    }

    .loader-bg-orb-2 {
      width: 200px;
      height: 200px;
      background: var(--loader-gold);
      bottom: -40px;
      left: -40px;
      animation-delay: -4s;
    }

    @keyframes float-orb {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -20px) scale(1.05); }
    }

    .loader-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding: 0 24px;
      width: 100%;
      max-width: 320px;
    }

    .loader-crown {
      position: relative;
      width: 64px;
      height: 64px;
    }

    .loader-crown svg {
      width: 100%;
      height: 100%;
      fill: none;
      stroke: var(--loader-gold);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 16px rgba(212, 175, 55, 0.5));
      animation: crown-float 3s ease-in-out infinite;
    }

    @keyframes crown-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .loader-equalizer {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 5px;
      height: 48px;
    }

    .loader-bar {
      width: 3px;
      background: linear-gradient(180deg, var(--loader-pink) 0%, var(--loader-pink-hover) 100%);
      border-radius: 3px;
      animation: bar-wave 1.2s ease-in-out infinite;
      box-shadow: 0 0 8px var(--loader-pink-glow);
    }

    .loader-bar:nth-child(1) { height: 16px; animation-delay: 0s; }
    .loader-bar:nth-child(2) { height: 28px; animation-delay: 0.1s; }
    .loader-bar:nth-child(3) { height: 40px; animation-delay: 0.2s; }
    .loader-bar:nth-child(4) { height: 32px; animation-delay: 0.3s; }
    .loader-bar:nth-child(5) { height: 44px; animation-delay: 0.4s; }
    .loader-bar:nth-child(6) { height: 36px; animation-delay: 0.5s; }
    .loader-bar:nth-child(7) { height: 24px; animation-delay: 0.6s; }
    .loader-bar:nth-child(8) { height: 40px; animation-delay: 0.7s; }
    .loader-bar:nth-child(9) { height: 20px; animation-delay: 0.8s; }

    @keyframes bar-wave {
      0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
      50% { transform: scaleY(1); opacity: 1; }
    }

    .loader-progress-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .loader-brand {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;
      animation: text-shimmer 3s ease-in-out infinite;
      background: linear-gradient(
        90deg,
        var(--loader-text) 0%,
        var(--loader-text-bright) 50%,
        var(--loader-text) 100%
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @keyframes text-shimmer {
      0%, 100% { background-position: 200% center; }
      50% { background-position: 0% center; }
    }

    .loader-progress-track {
      width: 100%;
      max-width: 200px;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .loader-progress-fill {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, var(--loader-pink), var(--loader-gold));
      border-radius: 2px;
      animation: progress-slide 2s ease-in-out infinite;
    }

    @keyframes progress-slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }

    .loader-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--loader-text);
    }

    .loader-dots {
      display: inline-flex;
      gap: 3px;
      margin-left: 2px;
    }

    .loader-dot {
      width: 3px;
      height: 3px;
      background: var(--loader-pink);
      border-radius: 50%;
      animation: dot-bounce 1.4s ease-in-out infinite;
    }

    .loader-dot:nth-child(1) { animation-delay: 0s; }
    .loader-dot:nth-child(2) { animation-delay: 0.2s; }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .loader-particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .loader-particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--loader-pink);
      border-radius: 50%;
      opacity: 0;
      animation: particle-rise 4s ease-in-out infinite;
    }

    .loader-particle:nth-child(1) { left: 20%; animation-delay: 0s; }
    .loader-particle:nth-child(2) { left: 40%; animation-delay: 1s; }
    .loader-particle:nth-child(3) { left: 60%; animation-delay: 2s; }
    .loader-particle:nth-child(4) { left: 80%; animation-delay: 3s; }
    .loader-particle:nth-child(5) { left: 30%; animation-delay: 0.5s; background: var(--loader-gold); }
    .loader-particle:nth-child(6) { left: 70%; animation-delay: 1.5s; background: var(--loader-gold); }

    @keyframes particle-rise {
      0% { bottom: -10px; opacity: 0; transform: translateX(0) scale(0); }
      10% { opacity: 0.6; transform: scale(1); }
      90% { opacity: 0.6; }
      100% { bottom: 100%; opacity: 0; transform: translateX(15px) scale(0.5); }
    }

    /* Tablet */
    @media (min-width: 481px) {
      .loader-content {
        gap: 36px;
        max-width: 360px;
      }
      .loader-crown {
        width: 72px;
        height: 72px;
      }
      .loader-equalizer {
        gap: 6px;
        height: 56px;
      }
      .loader-bar {
        width: 4px;
      }
      .loader-brand {
        font-size: 22px;
        letter-spacing: 5px;
      }
      .loader-progress-track {
        max-width: 240px;
      }
      .loader-status {
        font-size: 11px;
        letter-spacing: 2px;
      }
    }

    /* Desktop */
    @media (min-width: 769px) {
      .loader-bg-orb-1 {
        width: 400px;
        height: 400px;
        top: -100px;
        right: -100px;
      }
      .loader-bg-orb-2 {
        width: 300px;
        height: 300px;
        bottom: -50px;
        left: -50px;
      }
      .loader-content {
        gap: 40px;
      }
      .loader-crown {
        width: 80px;
        height: 80px;
      }
      .loader-equalizer {
        height: 60px;
      }
      .loader-brand {
        font-size: 24px;
        letter-spacing: 6px;
      }
      .loader-progress-track {
        max-width: 280px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .loader-bar, .loader-dot, .loader-particle, .loader-progress-fill,
      .loader-crown svg, .loader-bg-orb, .loader-brand { animation: none; }
      .loader-progress-fill { width: 50%; transform: translateX(50%); }
      .loader-bar { transform: scaleY(1); opacity: 1; }
    }
  </style>
</head>

  <script>
    (function() {
      var MIN_LOADER_TIME = 2500;
      var MAX_LOADER_TIME = 6000;
      var loaderStartTime = Date.now();
      var loaderHidden = false;

      function hideLoader() {
        if (loaderHidden) return;
        loaderHidden = true;
        var loader = document.getElementById('app-loader');
        if (loader) {
          loader.classList.add('hidden');
          setTimeout(function() {
            if (loader.parentNode) loader.parentNode.removeChild(loader);
            document.body.classList.remove('loader-active');
          }, 500);
        }
      }

      window.addEventListener('load', function() {
        var elapsed = Date.now() - loaderStartTime;
        var remainingTime = Math.max(0, MIN_LOADER_TIME - elapsed);
        setTimeout(hideLoader, remainingTime);
      });

      setTimeout(hideLoader, MAX_LOADER_TIME);
    })();
  </script>
